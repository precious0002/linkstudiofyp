<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Create Room</title>

        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&family=Mynerve&display=swap"
        rel="stylesheet">
        <link rel="stylesheet" href="css/createroom.css">
        <script src="js/createroom.js" defer></script>
    </head>

    <body class="create-body">
        <header class="topbar">
            <a href="index.html" class="back-link">
                <img src="assets/icons/backarrow.png" alt="Back"><span>BACK</span></a>
        </header>
        
        <main class="create-page">
            <p class="logo">LINK STUDIO</p>
            <h1 class="hero-title">
                <span class="handwritten">Create</span>
                <span class="hero-bold">work together</span>
            </h1>
            <p class="welcome-text">Welcome to Link Studio</p>

            <section class="room-box">
                <h2 class="box-title">Lets Create Your Room</h2>
                <p class="box-subtitle">pick a username and get ready to draw!</p>

                <div class="field-group">
                    <input id="username" class="input-field wide-input" type="text" placeholder="username">
                </div>

                <p class="room-help">enter room ID or generate</p>

                <div class="room-row">
                    <input id="roomId" class="input-field room-input" type="text" placeholder="room ID">
                    <button id="generate-btn" class="button generate-btn" type="button">Generate</button>
                </div>

                <p id="error" class="error-text"></p>

                <button id="createBtn" class="button main-createbtn" type="button">Create or Join Room</button>
            </section>
        </main>
    </body>
</html>
