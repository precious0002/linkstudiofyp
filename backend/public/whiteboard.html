<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Link Studio Whiteboard</title>

        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Mynerve&display=swap" rel="stylesheet"/>

        <link rel="stylesheet" href="css/whiteboard.css" />
        <script src="/socket.io/socket.io.js"></script>
        <script src="js/whiteboard.js" defer></script>
    </head>
    <body class="whiteboard-body">
      
      <header class="topbar">
        <div class="topbar-left">
          <a href="index.html" class="top-button">Exit</a>
          

          <p class="room-text">Room: <span id="roomCode">----</span></p>
          <p class="room-text">Users: <span id="userCountText">1</span></p>
          <p class="room-text">Users: <span id="userList"></span></p>
        </div>
      </header>
      
      <main class="whiteboard-page">
        <div class="toolbar-container">
          <div class="toolbar">

            <button class="tool-btn tool" id="rectangle" type="button">
              <img src="assets/icons/rectangle.png" alt="Rectangle" />
            </button>

            <button class="tool-btn tool" id="triangle" type="button">
              <img src="assets/icons/triangle.png" alt="Triangle" />
            </button>

            <button class="tool-btn tool" id="circle" type="button">
              <img src="assets/icons/circle.png" alt="Circle" />
            </button>
            
            <button class="tool-btn tool" id="line" type="button">
              <img src="assets/icons/line.png" alt="Line" />
            </button>
            
            <button class="tool-btn tool active" id="pencil" type="button">
              <img src="assets/icons/pencil.png" alt="Pencil" />
            </button>

            <button class="tool-btn tool" id="eraser" type="button">
              <img src="assets/icons/eraser.png" alt="Eraser" />
            </button>

            <button class="tool-btn clear-canvas" type="button">
              <img src="assets/icons/trash.png" alt="Clear canvas" />
            </button>
            
            <div class="divider"></div>
            
            <input type="range" id="size-slider" min="1" max="30" value="5" />
            
            <button class="tool-btn color-tool">
              <img src="assets/icons/colourpicker.png" alt="Color">
              <input type="color" id="color-picker" value="#000000">
            </button>
            
            <div class="divider"></div>

            <button class="tool-btn save-img" type="button">
              <img src="assets/icons/download.png" alt="Download" />
            </button>
          
          </div>
        </div>
        <div class="canvas-container">
          <canvas width="2000" height="700"></canvas>
        </div>
      </main>
    </body>
    </html>
